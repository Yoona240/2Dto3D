  # manifest.json 中路径前缀可选列表（支持新旧服务器迁移）
  path_prefixes:
    - "/data-oss/meiguang/xiaoliang/data/2d3d_data"
    - "/seaweedfs/xiaoliang/data/2d3d_data"
# =====================================================
# API REQUEST VALIDATION
# =====================================================

# This section documents the fail-loudly principle for API request validation.
# 
# FAIL-LOUDLY PRINCIPLE:
# - All required parameters MUST be provided in API requests
# - Missing required parameters will cause immediate failure with explicit error messages
# - No silent fallbacks or default values are used in code for required parameters
# - This ensures scientific reproducibility by making configuration errors visible immediately
#
# SINGLE SOURCE OF TRUTH:
# - Configuration values are defined only in config.yaml
# - Code never provides default values for parameters defined in configuration
# - If a parameter is required, it must be explicitly provided by the caller

# Required parameters for each task type
# These parameters MUST be provided in API requests to /api/task
# Missing any of these will raise ValueError with descriptive error message

required_params:
  # Text-to-Image generation task
  t2i:
    - prompt_id          # ID of the prompt to use for generation
  
  # 3D model generation task
  gen3d:
    - image_id           # ID of the source image
    - image_path         # Path to the source image file
    - provider           # 3D generation provider (tripo, oneapi, rodin)
  
  # Instruction-based image editing task
  instruction:
    - image_id           # ID of the image to edit
    - image_path         # Path to the image file
    - edit_type          # Type of edit (remove, replace, both)
  
  # 3D model rendering task
  render:
    - model_id           # ID of the 3D model to render
    - model_path         # Path to the 3D model file (.glb)
  
  # Single image editing task
  edit:
    - image_id           # ID of the image to edit
    - image_path         # Path to the image file
    - instruction        # Natural language editing instruction
  
  # Multi-view editing task (edit specific view of 3D model)
  edit_view:
    - model_id           # ID of the 3D model
    - view_name          # Name of the view to edit (front, back, left, right, top, bottom)
    - instruction        # Natural language editing instruction
    - edit_type          # Type of edit (remove, replace, both)

# Optional parameters with documented purposes
# These parameters have legitimate reasons to be optional
# Code may use .get() for these, but must document why they are optional

optional_params:
  gen3d:
    - remote_task_id     # Only used for task recovery/resumption after restart
                         # When provided, skips generation and polls existing remote task
                         # When absent, creates new generation task

language: "en"

